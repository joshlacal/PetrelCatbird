name: Swift

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode_16.2.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
